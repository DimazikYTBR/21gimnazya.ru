<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>21 Гимназия | Казань</title>

    
    <style>
        body {
            margin: 0;
            font-family: 'Inter', -apple-system, sans-serif;
            background: white;
            display: flex;
            flex-direction: column;
            align-items: center;
            overflow-x: hidden;
        }

        @font-face {
            font-family: 'Inter';
            src: url('./fonts/Inter.ttf') format('truetype');
            font-weight: 100 900;
            font-style: normal;
            font-display: swap;
        }

        * { box-sizing: border-box; }

        header {
            width: 100%;
            height: 70px;
            display: flex;
            justify-content: center;
            align-items: center;
            position: sticky;
            top: 0;
            z-index: 1000;
        }

        .header-container {
            position: sticky;
            z-index: 100;
            backdrop-filter: blur(8px);
            width: 70%; max-width: 1100px;
            display: flex;
            justify-content: space-between;
            padding: 0.5rem 1.5rem; 
            top: 8px; 
            position: fixed;
            margin: 10px auto;
            border-radius: 20px; 
        }

        .logo-container {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .logo-text {
            font-weight: 800;
            font-size: 24px;
            letter-spacing: -1px;
        }

        .btn-wallet {
            background: #000;
            color: #fff;
            padding: 10px 22px;
            border-radius: 25px;
            text-decoration: none;
            font-weight: 600;
            font-size: 14px;
            transition: 0.3s;
        }

        .btn-wallet:hover { transform: scale(1.05); }

        .slider-container {
    width: 100%;
    max-width: 1100px;
    margin: 40px auto;
    overflow: hidden !important;
    border-radius: 28px;
}

.slider-track {
    display: flex;
    width: 100%;
    transition: transform 0.6s cubic-bezier(0.4, 0, 0.2, 1);
    gap: 0 !important; 
}

.slide {
    flex: 0 0 100%;
    width: 100%;
    height: 450px;
    border-radius: 28px !important;
    overflow: hidden;

    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    text-align: center;
}

@media (max-width: 850px) {
    .slide {
        min-width: 90vw;
        height: 400px;
    }
    .slider-track {
        padding-left: 5%;
    }
}

.slide h2 {
    font-size: 36px;
    margin-bottom: 10px;
}

.slide p {
    font-size: 18px;
    opacity: 0.8;
    margin-bottom: 30px;
}

.slide-btn {
    display: inline-block;
    padding: 12px 24px;
    background: rgba(255, 255, 255, 0.2);
    backdrop-filter: blur(10px);
    border-radius: 12px;
    text-decoration: none;
    color: #fff;
    font-weight: 600;
    margin-top: 20px;
}

.slider-dots {
    display: flex;
    justify-content: center;
    align-items: center;
    gap: 8px;
    margin-top: 20px;
}

.dots-island-container {
    display: flex;
    justify-content: center;
    margin-top: 25px;
}

.slider-dots {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 8px 16px;

    background: rgba(255, 255, 255, 0.05);
    backdrop-filter: blur(20px) saturate(180%);
    -webkit-backdrop-filter: blur(20px) saturate(180%);
    border: 1px solid rgba(255, 255, 255, 0.1);
    border-radius: 999px;
    
    box-shadow: 0 10px 25px rgba(0, 0, 0, 0.2);
}

.dot {
    width: 8px;
    height: 8px;
    background: rgb(29, 29, 29);
    border-radius: 50%;
    cursor: pointer;
    transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
}

.dot.active {
    width: 22px;
    border-radius: 6px;
    background: #007aff;
    box-shadow: 0 0 15px rgba(0, 122, 255, 0.5);
}
    </style>
</head>
<body>
<header>
    <div class="header-container">
        <div class="logo-container">
            <img src="dubnew22.png" alt="21" style="width: 32px; height: 32px; border-radius: 8px;">
            <div class="logo-text">Гимназия №21</div>
        </div>
        <a class="btn-wallet">Оставить Заявку</a>
    </div>
</header>
<div class="slider-container">
    <div class="slider-track">

        <div class="slide" style="background: linear-gradient(135deg, #2af5ff 0%, #2196f3 100%);">
            <div class="slide-content">
                <h2>832 учащихся 🚀</h2>
                <p>Получают каждый день знания! 📄</p>
                <a href="https://edu.tatar.ru/priv/page2371.htm/main-news" class="slide-btn">Много</a>
            </div>
            <img src="твой_дизайн_1.png" alt="" class="slide-img">
        </div>

        <div class="slide" style="background: #efeff4;">
            <div class="slide-content" style="color: #000;">
                <h2>57 учителей 📕</h2>
                <p>И все готовы передать знания детям! 📏</p>
                <a href="https://edu.tatar.ru/priv/page2371.htm/main-news" class="slide-btn" style="background: #007aff; color: #fff;">Круто</a>
            </div>
        </div>

        <div class="slide" style="background: linear-gradient(135deg, #b89d25 0%, #f32121 100%);">
            <div class="slide-content">
                <h2>Частые мероприятия 🎨</h2>
                <p>Также проводятся мероприятия и новости о окончании появляются тут: https://edu.tatar.ru/priv/page2371.htm/main-news. 📢</p>
                <a href="https://edu.tatar.ru/priv/page2371.htm/main-news" class="slide-btn">Посмотреть</a>
            </div>
            <img src="твой_дизайн_1.png" alt="" class="slide-img">
        </div>
    </div>

<div class="dots-island-container">
    <div class="slider-dots">
        <div class="dot active" onclick="goToSlide(0)"></div>
        <div class="dot" onclick="goToSlide(1)"></div>
        <div class="dot" onclick="goToSlide(2)"></div>
    </div>
</div>
</div>
<script>
let currentSlide = 0;

function goToSlide(index) {
    const track = document.querySelector('.slider-track');
    const dots = document.querySelectorAll('.dot');

    track.style.transform = `translateX(-${index * 100}%)`;

    dots.forEach(dot => dot.classList.remove('active'));
    dots[index].classList.add('active');
}
</script>
</body>
</html>
