<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>21 Гимназия | Казань</title>

    
    <style>
        body {
            margin: 0;
            font-family: 'Inter', -apple-system, sans-serif;
            background: white;
            display: flex;
            flex-direction: column;
            align-items: center;
            overflow-x: hidden;
        }

        @font-face {
            font-family: 'Inter';
            src: url('./fonts/Inter.ttf') format('truetype');
            font-weight: 100 900;
            font-style: normal;
            font-display: swap;
        }

        * { box-sizing: border-box; }

        header {
            width: 100%;
            height: 70px;
            display: flex;
            justify-content: center;
            align-items: center;
            position: sticky;
            top: 0;
            z-index: 1000;
        }

        .header-container {
            position: sticky;
            z-index: 100;
            backdrop-filter: blur(8px);
            width: 70%; max-width: 1100px;
            display: flex;
            justify-content: space-between;
            padding: 0.5rem 1.5rem; 
            top: 8px; 
            position: fixed;
            margin: 10px auto;
            border-radius: 20px; 
        }

        .logo-container {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .logo-text {
            font-weight: 800;
            font-size: 24px;
            letter-spacing: -1px;
        }
    </style>
</head>
<body>
<header>
    <div class="header-container">
        <div class="logo-container">
            <img src="dubnew22.png" alt="21" style="width: 32px; height: 32px; border-radius: 8px;">
            <div class="logo-text">Гимназия №21</div>
        </div>
    </div>
</body>
</html>
